<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meditative Camera Journey</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div class="overlay">
      <div class="title">Drift Journal</div>
      <div class="subtitle">Move gently with arrow keys or WASD.</div>
      <div id="status">Discovered symbols: 0 / 7</div>
    </div>
    <div id="win-screen" class="win-screen hidden">
      <div class="win-card">
        <div class="win-title">All Symbols Found</div>
        <div class="win-text">You mapped the entire drift world.</div>
        <button id="restart-btn" type="button">Scatter Again</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
